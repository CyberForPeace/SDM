<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Modeling - Complete Review & Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            color: #ffffff;
        }

        /* Main Layout */
        .layout-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            color: white;
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(217, 119, 6, 0.3);
            z-index: 1000;
            border-right: 2px solid #d97706;
        }

        .sidebar-header {
            padding: 0 20px 30px;
            border-bottom: 2px solid #d97706;
            margin-bottom: 20px;
        }

        .sidebar-header h1 {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fbbf24;
        }

        .sidebar-header p {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 12px;
        }

        .nav-tab {
            padding: 12px 16px;
            background: rgba(217, 119, 6, 0.1);
            color: #ffffff;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.95em;
            text-align: left;
            white-space: normal;
            word-wrap: break-word;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .nav-tab:hover {
            background: rgba(217, 119, 6, 0.3);
            border-color: #d97706;
            transform: translateX(5px);
        }

        .nav-tab.active {
            background: #d97706;
            color: #ffffff;
            border-color: #fbbf24;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.5);
        }

        /* Main Content Area */
        .main-content {
            margin-left: 280px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header & Navigation */
        .header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            padding: 30px 40px;
            box-shadow: 0 2px 10px rgba(217, 119, 6, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid #d97706;
        }

        .header h1 {
            text-align: center;
            font-size: 1.8em;
            font-weight: 700;
            color: #fbbf24;
        }

        /* Content Container */
        .content-wrapper {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: #1a1a1a;
        }

        /* Lecture Content */
        .lecture-section {
            display: none;
            background: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
            border: 1px solid #d97706;
            overflow: hidden;
            animation: slideIn 0.3s ease;
        }

        .lecture-section.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lecture-content {
            padding: 40px;
            background: #2a2a2a;
            color: #e5e5e5;
        }

        .page-block {
            margin-bottom: 35px;
            border-left: 4px solid #d97706;
            padding-left: 50px;
            padding-top: 20px;
            padding-right: 15px;
        }

        .page-block:last-child {
            margin-bottom: 0;
        }

        .page-title {
            font-size: 1.6em;
            color: #fbbf24;
            margin-bottom: 15px;
            margin-top: 10px;
            font-weight: 700;
        }

        .page-text {
            color: #e5e5e5;
            line-height: 1.8;
            font-size: 1em;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 15px;
        }

        .page-text strong {
            color: #fbbf24;
            font-weight: 600;
        }

        .explanation {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.15) 0%, rgba(251, 191, 36, 0.1) 100%);
            color: #fbbf24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #d97706;
            border: 2px solid #d97706;
        }

        .explanation h4 {
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #fbbf24;
            font-weight: 700;
        }

        .explanation-text {
            line-height: 1.7;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            margin: 25px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #2a2a2a;
            box-shadow: 0 2px 8px rgba(217, 119, 6, 0.2);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #d97706;
        }

        th {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: #ffffff;
            padding: 14px;
            text-align: left;
            font-weight: 700;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #3a3a3a;
            color: #e5e5e5;
        }

        tr:hover {
            background: rgba(217, 119, 6, 0.1);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Quiz Section */
        #quiz-section {
            display: none;
            animation: slideIn 0.3s ease;
        }

        #quiz-section.active {
            display: block;
        }

        .quiz-header {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: #ffffff;
            padding: 35px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
        }

        .quiz-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
            font-weight: 700;
            color: #ffffff;
        }

        .quiz-header p {
            font-size: 1.05em;
            opacity: 0.9;
        }

        .quiz-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #2a2a2a;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            border: 1px solid #d97706;
        }

        .filter-group label {
            font-weight: 600;
            color: #fbbf24;
            white-space: nowrap;
        }

        .filter-group select {
            padding: 8px 12px;
            border: 2px solid #d97706;
            border-radius: 6px;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-group select:hover {
            border-color: #fbbf24;
            box-shadow: 0 2px 8px rgba(217, 119, 6, 0.4);
        }

        .filter-group button {
            padding: 8px 20px;
            background: #d97706;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .filter-group button:hover {
            background: #f59e0b;
            transform: translateY(-1px);
        }

        .quiz-questions {
            display: grid;
            gap: 20px;
        }

        .question-card {
            background: #2a2a2a;
            border: 2px solid #3a3a3a;
            border-radius: 10px;
            padding: 25px;
            transition: all 0.3s ease;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .question-card.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .question-card:hover {
            border-color: #d97706;
            box-shadow: 0 4px 16px rgba(217, 119, 6, 0.3);
        }

        .question-card.answered {
            background: rgba(217, 119, 6, 0.1);
            border-color: #d97706;
        }

        .question-card.locked .option {
            pointer-events: none;
            cursor: not-allowed;
        }

        .question-number {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: #ffffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .question-text {
            font-size: 1.15em;
            color: #fbbf24;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option {
            padding: 14px 16px;
            background: #1a1a1a;
            border: 2px solid #3a3a3a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            color: #e5e5e5;
        }

        .option:hover:not(.locked *) {
            background: rgba(217, 119, 6, 0.15);
            border-color: #d97706;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #d97706;
        }

        .option.correct {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }

        .option.correct input[type="radio"] {
            accent-color: #22c55e;
        }

        .option.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        .option.incorrect input[type="radio"] {
            accent-color: #ef4444;
        }

        .option.selected {
            background: rgba(217, 119, 6, 0.3);
            border-color: #d97706;
        }

        .feedback {
            margin-top: 18px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
            border-left: 4px solid;
            line-height: 1.6;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border-color: #22c55e;
        }

        .feedback.incorrect {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border-color: #ef4444;
        }

        /* Quiz Stats */
        .quiz-stats {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
        }

        .quiz-stats h3 {
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .stats-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 18px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .stat-number {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-item div:last-child {
            font-size: 0.95em;
            opacity: 0.95;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .layout-wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px 0;
            }

            .sidebar-header {
                padding: 0 15px 15px;
            }

            .nav-tabs {
                flex-direction: row;
                overflow-x: auto;
                padding: 0 15px;
                gap: 10px;
            }

            .nav-tab {
                flex-shrink: 0;
                padding: 10px 14px;
                font-size: 0.9em;
            }

            .main-content {
                margin-left: 0;
            }

            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .content-wrapper {
                padding: 20px;
            }

            .lecture-content {
                padding: 20px;
            }

            .page-block {
                margin-bottom: 25px;
            }

            .page-title {
                font-size: 1.3em;
            }

            .page-text {
                font-size: 0.95em;
            }

            .explanation {
                padding: 15px;
            }

            .table-wrapper {
                font-size: 0.9em;
                margin: 15px 0;
            }

            td, th {
                padding: 10px;
            }

            .quiz-controls {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
                flex-wrap: wrap;
            }

            .filter-group select,
            .filter-group button {
                flex: 1;
                min-width: 120px;
            }

            .quiz-questions {
                gap: 15px;
            }

            .question-card {
                padding: 18px;
            }

            .question-text {
                font-size: 1em;
            }

            .option {
                padding: 12px 14px;
                font-size: 0.95em;
            }

            .option input[type="radio"] {
                width: 16px;
                height: 16px;
                margin-right: 10px;
            }

            .stats-content {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }

            .stat-number {
                font-size: 1.8em;
            }

            /* Diagram responsiveness for mobile */
            .lecture-diagram {
                padding: 15px;
                overflow-x: auto;
            }

            .lecture-diagram svg {
                min-width: 100%;
            }

            .diagram-title {
                font-size: 1em;
                margin-bottom: 10px;
            }
        }

        @media (max-width: 480px) {
            .sidebar-header h1 {
                font-size: 1.2em;
            }

            .nav-tab {
                padding: 8px 12px;
                font-size: 0.85em;
            }

            .header h1 {
                font-size: 1.2em;
            }

            .content-wrapper {
                padding: 15px;
            }

            .lecture-content {
                padding: 15px;
            }

            .page-title {
                font-size: 1.1em;
            }

            .page-text {
                font-size: 0.9em;
                line-height: 1.6;
            }

            .question-card {
                padding: 15px;
            }

            .question-number {
                width: 36px;
                height: 36px;
                font-size: 0.95em;
            }

            .quiz-header {
                padding: 20px;
            }

            .quiz-header h2 {
                font-size: 1.4em;
            }

            .stats-content {
                grid-template-columns: 1fr;
            }

            /* Ultra-mobile responsive diagrams */
            .lecture-diagram {
                padding: 10px;
                margin: 15px 0;
            }

            .diagram-title {
                font-size: 0.95em;
            }

            .lecture-diagram svg {
                width: 100%;
                height: auto;
            }
        }

        /* Landscape Mode Optimization */
        @media (max-height: 600px) and (orientation: landscape) {
            .layout-wrapper {
                flex-direction: row;
            }

            .sidebar {
                width: 40%;
                height: 100vh;
                overflow-y: auto;
                padding: 0;
            }

            .sidebar-header {
                padding: 10px 15px;
            }

            .sidebar-header h1 {
                font-size: 1em;
            }

            .nav-tabs {
                flex-direction: column;
                gap: 5px;
                padding: 10px;
            }

            .nav-tab {
                padding: 8px 12px;
                font-size: 0.8em;
            }

            .main-content {
                width: 60%;
                margin-left: 0;
            }

            .header {
                padding: 10px 15px;
            }

            .header h1 {
                font-size: 1.1em;
            }

            .content-wrapper {
                padding: 15px;
            }

            .lecture-content {
                padding: 15px;
            }

            .page-title {
                font-size: 1.05em;
            }

            .page-text {
                font-size: 0.85em;
            }

            .page-block {
                margin-bottom: 15px;
            }

            .explanation {
                padding: 10px;
                font-size: 0.8em;
            }

            .question-card {
                padding: 12px;
            }

            .question-text {
                font-size: 0.9em;
            }

            .option {
                padding: 8px 10px;
                font-size: 0.85em;
            }

            .lecture-diagram {
                padding: 10px;
                margin: 10px 0;
            }

            .diagram-title {
                font-size: 0.9em;
            }

            .lecture-diagram svg {
                max-height: 300px;
                width: 100%;
                height: auto;
            }

            .stats-content {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-item {
                padding: 10px;
            }

            .stat-number {
                font-size: 1.4em;
            }

            .stat-label {
                font-size: 0.8em;
            }

            .table-wrapper {
                font-size: 0.8em;
            }

            td, th {
                padding: 6px;
            }
        }

        /* Extra small portrait phones */
        @media (max-width: 360px) {
            .sidebar-header h1 {
                font-size: 1em;
            }

            .nav-tab {
                padding: 6px 10px;
                font-size: 0.8em;
            }

            .header h1 {
                font-size: 1.1em;
            }

            .content-wrapper {
                padding: 12px;
            }

            .lecture-content {
                padding: 12px;
            }

            .page-title {
                font-size: 1em;
            }

            .page-text {
                font-size: 0.85em;
            }

            .question-card {
                padding: 12px;
            }

            .lecture-diagram {
                padding: 8px;
            }

            .diagram-title {
                font-size: 0.9em;
            }

            .stats-content {
                grid-template-columns: 1fr;
            }
        }

        /* Utility Classes */
        .highlight {
            background: rgba(217, 119, 6, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            color: #fbbf24;
            font-weight: 600;
        }

        .code-block {
            background: #1a1a1a;
            border-left: 4px solid #d97706;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
            border: 1px solid #3a3a3a;
        }

        .code-block code {
            color: #fbbf24;
            font-size: 0.95em;
        }

        /* Icon Styling */
        i.fas {
            margin-right: 8px;
            font-size: 1.1em;
        }

        h1 i.fas,
        h2 i.fas {
            margin-right: 12px;
            font-size: 1.2em;
        }

        h4 i.fas {
            margin-right: 8px;
            color: #fbbf24;
        }

        .nav-tab i.fas {
            margin-right: 8px;
            font-size: 1em;
        }

        /* Diagram Styling */
        .lecture-diagram {
            background: #2a2a2a;
            border: 2px solid #d97706;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 2px 8px rgba(217, 119, 6, 0.2);
        }

        .lecture-diagram svg {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }

        .diagram-title {
            font-weight: 600;
            color: #fbbf24;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .back-to-top {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 99;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.4);
        }

        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(217, 119, 6, 0.6);
        }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-book"></i> System Modeling</h1>
                <p>Complete Review & Quiz</p>
            </div>
            <div class="nav-tabs" id="lectureNavTabs">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <h1><i class="fas fa-book"></i> System Modeling - Complete Review & Quiz</h1>
            </div>

            <!-- Content Area -->
            <div class="content-wrapper">
                <!-- Lecture Sections -->
                <div id="lectureContainer">
                    <!-- Generated by JavaScript -->
                </div>

                <!-- Quiz Section -->
                <section id="quiz-section">
                    <div class="quiz-header">
                        <h2><i class="fas fa-bullseye"></i> Interactive Quiz</h2>
                        <p>Test your knowledge on System Modeling concepts</p>
                    </div>

                    <div class="quiz-controls">
                        <div class="filter-group">
                            <label for="lectureFilter">Filter by Lecture:</label>
                            <select id="lectureFilter">
                                <option value="all">All Lectures</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <button onclick="resetQuiz()">Reset Quiz</button>
                        </div>
                    </div>

                    <div class="quiz-questions" id="quizContainer">
                        <!-- Generated by JavaScript -->
                    </div>

                    <div class="quiz-stats" id="quizStats">
                        <h3>Quiz Statistics</h3>
                        <div class="stats-content">
                            <div class="stat-item">
                                <div class="stat-number" id="totalAnswered">0</div>
                                <div>Answered</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="correctCount">0</div>
                                <div>Correct</div>
                            </div>

        function generateLectureTabs() {
            const navContainer = document.getElementById('lectureNavTabs');
            const tabs = Object.keys(lectureData);
            
            tabs.forEach((lecture, index) => {
                const tab = document.createElement('div');
                tab.className = 'nav-tab' + (index === 0 ? ' active' : '');

            quizTab.className = 'nav-tab';
            quizTab.innerHTML = '<i class="fas fa-bullseye"></i> Quiz';
            quizTab.onclick = () => switchToQuiz();

        function generateLectureContent() {
            const container = document.getElementById('lectureContainer');
            const lectures = Object.keys(lectureData);

            lectures.forEach((lectureName, lectureIndex) => {
                const lectureSection = document.createElement('section');
                lectureSection.className = 'lecture-section' + (lectureIndex === 0 ? ' active' : '');
                lectureSection.id = 'lecture-' + lectureName;

                const headerHTML = `
                    <div class="lecture-header">
                        <h2>${lectureName}</h2>
                        <p>Complete Review & Learning Material</p>
                    </div>
                    <div class="lecture-content"></div>
                `;
                lectureSection.innerHTML = headerHTML;

                const contentDiv = lectureSection.querySelector('.lecture-content');
                const pages = lectureData[lectureName].pages;

                pages.forEach((page, index) => {
                    const pageBlock = document.createElement('div');
                    pageBlock.className = 'page-block';

                    let pageHTML = `
                        <div class="page-title">${page.title}</div>
                        <div class="page-text">${page.content}</div>
                    `;

                    if (page.explanation) {
                        pageHTML += `
                            <div class="explanation">
                                <h4><i class="fas fa-lightbulb"></i> Teacher's Explanation:</h4>
                                <div class="explanation-text">${page.explanation}</div>
                            </div>
                        `;
                    }

                    pageBlock.innerHTML = pageHTML;
                    contentDiv.appendChild(pageBlock);
                    
                    // Add diagram if applicable
                    const diagram = generateDiagram(lectureName, index);
                    if (diagram) {
                        contentDiv.appendChild(diagram);
                    }
                });

                container.appendChild(lectureSection);
            });
        }

        function generateQuizFilter() {
            const filter = document.getElementById('lectureFilter');
            const lectures = Object.keys(lectureData);

            lectures.forEach(lecture => {
                const option = document.createElement('option');
                option.value = lecture;
                option.textContent = lecture;
                filter.appendChild(option);
            });

            filter.addEventListener('change', () => filterQuestions());
        }

        function generateQuizQuestions() {
            const container = document.getElementById('quizContainer');
            
            quizQuestions.forEach((q, index) => {
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card show';
                questionCard.dataset.lecture = q.lecture;
                questionCard.dataset.index = index;

                let optionsHTML = '';
                q.options.forEach((option, optIndex) => {
                    optionsHTML += `
                        <label class="option">
                            <input type="radio" name="q${index}" value="${optIndex}" onclick="selectAnswer(${index}, ${optIndex})">
                            <span>${option}</span>
                        </label>
                    `;
                });

                questionCard.innerHTML = `
                    <div class="question-number">${index + 1}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">${optionsHTML}</div>
                    <div class="feedback" id="feedback-${index}"></div>
                `;

                container.appendChild(questionCard);
            });
        }

        function switchLecture(lectureName) {
            // Hide all sections
            document.querySelectorAll('.lecture-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById('quiz-section').classList.remove('active');

            // Hide all nav tabs highlight
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected section
            document.getElementById('lecture-' + lectureName).classList.add('active');

            // Highlight selected tab
            event.target.classList.add('active');

            scrollToTop();
        }

        function switchToQuiz() {
            document.querySelectorAll('.lecture-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            document.getElementById('quiz-section').classList.add('active');
            event.target.classList.add('active');

            scrollToTop();
        }

        function selectAnswer(questionIndex, optionIndex) {
            const question = quizQuestions[questionIndex];
            const questionCard = document.querySelector(`[data-index="${questionIndex}"]`);
            const feedbackDiv = document.getElementById(`feedback-${questionIndex}`);
            const options = questionCard.querySelectorAll('.option');

            options.forEach((opt, idx) => {
                opt.classList.remove('correct', 'incorrect', 'selected');
            });

            if (optionIndex === question.correct) {
                options[optionIndex].classList.add('correct');
                feedbackDiv.className = 'feedback show correct';
                feedbackDiv.innerHTML = `✓ Correct! ${question.explanation}`;
            } else {
                options[optionIndex].classList.add('incorrect');
                options[question.correct].classList.add('correct');
                feedbackDiv.className = 'feedback show incorrect';
                feedbackDiv.innerHTML = `✗ Incorrect. The correct answer is: ${question.options[question.correct]}. ${question.explanation}`;
            }

            questionCard.classList.add('answered');
            questionCard.classList.add('locked');
            updateStats();
        }

        function filterQuestions() {
            const selectedLecture = document.getElementById('lectureFilter').value;
            const questions = document.querySelectorAll('.question-card');

            questions.forEach(card => {
                if (selectedLecture === 'all' || card.dataset.lecture === selectedLecture) {
                    card.classList.add('show');
                } else {
                    card.classList.remove('show');
                }
            });

            updateStats();
        }

        function updateStats() {
            const allQuestions = document.querySelectorAll('.question-card.show');
            let answered = 0;
            let correct = 0;

            allQuestions.forEach(card => {
                const feedback = card.querySelector('.feedback');
                if (feedback && feedback.classList.contains('show')) {
                    answered++;
                    if (feedback.classList.contains('correct')) {
                        correct++;
                    }
                }
            });

            const percentage = allQuestions.length > 0 ? Math.round((correct / answered * 100)) || 0 : 0;

            document.getElementById('totalAnswered').textContent = answered;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('scorePercentage').textContent = answered > 0 ? percentage + '%' : '0%';
        }

        function resetQuiz() {
            document.querySelectorAll('.question-card').forEach(card => {
                card.classList.remove('answered', 'locked');
                const inputs = card.querySelectorAll('input[type="radio"]');
                inputs.forEach(input => input.checked = false);
                const feedback = card.querySelector('.feedback');
                if (feedback) {
                    feedback.classList.remove('show', 'correct', 'incorrect');
                }
                const options = card.querySelectorAll('.option');
                options.forEach(opt => opt.classList.remove('correct', 'incorrect', 'selected'));
            });
            updateStats();
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Back to top button
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.style.display = 'flex';
            } else {
                btn.style.display = 'none';
            }
        });

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initializePage);
    </script>
